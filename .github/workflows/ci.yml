name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      # installs Node from mise.toml, then the postinstall hook runs `npm install`
      - run: mise install
      - run: npm run verify
